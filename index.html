<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Whisper STT</title>
<style>
  body { margin: 0; background: #111; color: #eee; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 12px; }
  button { padding: 12px 24px; font-size: 16px; cursor: pointer; border: none; border-radius: 6px; }
  select { padding: 8px 12px; font-size: 14px; background: #222; color: #eee; border: 1px solid #444; border-radius: 6px; }
  #recBtn { background: #c33; color: white; }
  #recBtn.recording { background: #2a7; }
  #recBtn:disabled { opacity: 0.5; cursor: not-allowed; }
  #status { color: #aaa; font-family: monospace; }
  #output { width: 640px; max-width: 100%; min-height: 200px; background: #222; padding: 16px; border-radius: 8px; white-space: pre-wrap; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }
</style>
</head>
<body>
<h1>Whisper — Speech to Text</h1>
<div class="row">
  <label>Model:</label>
  <select id="modelSel">
    <option value="tiny-en">English Tiny (~40MB, fast)</option>
    <option value="small-en">English Small (~250MB, accurate)</option>
    <option value="small-ko">Korean Small (~250MB)</option>
  </select>
  <button id="loadBtn">Load Model</button>
</div>
<button id="recBtn" disabled>Record</button>
<div id="status">Pick model and click Load</div>
<div id="output">Transcription will appear here</div>
<script type="module" src="./app.js"></script>
</body>
</html>
